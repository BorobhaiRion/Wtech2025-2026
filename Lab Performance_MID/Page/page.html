<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product management page</title>
    <link rel="stylesheet" href="../Design/style.css">
</head>
<body>
    <h2>Product management Page</h2> 

    <div class="form">
        <label for="u_price" name="u_price">Unit Price</label> <br>
        <input type="text" for="u_price" id="u_price" name="u_price" value="1000" >
        <br>
        <label for="qpd" name="qpd">Quantity Per Day</label> <br>
        <input type="number" for="qpd" id="qpd" name="u_price" placeholder="Enter the quantity">
        <br>
        <label for="t" name="t">Total price for 30 Days</label> <br>
        <input type="number" name="t" id="t" placeholder="0">

      </div>
    <script src="../JS/validation.js"></script>
</body>
</html>
